- name: Install Node.js and npm
  hosts: web
  become: yes
  tasks:
    - name: Install Node.js and npm packages
      ansible.builtin.package:
        name:
          - nodejs
          - npm
        state: present
    - name: run Node.js and npm packages
      ansible.builtin.package:
        name:
          - nodejs
          - npm
        state: started